services:
  - type: web
    name: intelligent-devops-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MEM0_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
